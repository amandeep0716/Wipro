<!DOCTYPE html>
<html>
<head>
    <title>Chat</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Socket.IO Chat</h2>

<div class="container">

    <div class="users">

        <h3>Online Users</h3>

        <select id="userList">
            <option value="">Broadcast</option>
        </select>

    </div>

    <div class="chat">

        <div id="messages"></div>

        <input
            id="msg"
            placeholder="Enter Message"
        >

        <button onclick="sendMessage()">
            Send
        </button>

    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="chat.js"></script>

</body>
</html>
